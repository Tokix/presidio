# Host for Ollama service required by presidio-analyzer
ollamaHost: "ollama.flowise.svc.cluster.local:11434"
# OpenShift image registry host
imageRegistry: image-registry.openshift-image-registry.svc:5000
# Namespace for OpenShift image registry
namespace: presidio
# Default values for presidio.
replicaCount: 1



image:
  tag: latest
  pullPolicy: IfNotPresent

analyzer:
  enabled: true
  image:
    name: presidio-analyzer
    tag: latest
    pullPolicy: IfNotPresent
  ollamaHost: "ollama.flowise.svc.cluster.local:11434"
  service:
    type: ClusterIP
    port: 5002
    targetPort: 5001

anonymizer:
  enabled: true
  image:
    name: presidio-anonymizer
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5001
    targetPort: 5001

imageRedactor:
  enabled: true
  image:
    name: presidio-image-redactor
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5003
    targetPort: 5001

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
