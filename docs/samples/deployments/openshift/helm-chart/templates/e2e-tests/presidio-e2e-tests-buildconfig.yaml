apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: presidio-e2e-tests
spec:
  source:
    type: Git
    git:
      uri: https://github.com/microsoft/presidio.git
    dockerfile: |
        FROM python:3.10-slim
        ENV SPACY_DATA=/usr/local/lib/python3.10/site-packages
        WORKDIR /repo
        COPY . ./
        WORKDIR /repo/e2e-tests
        ENV PIP_ROOT_USER_ACTION=ignore
        RUN pip install --upgrade pip
        RUN pip install --no-cache-dir -r requirements.txt \
          && pip install --no-cache-dir -e ../presidio-analyzer[langextract] -e ../presidio-anonymizer \
          && python -m spacy download en_core_web_lg \
          && python -m spacy validate
        CMD ["pytest"]
  strategy:
    type: Docker
  output:
    to:
      kind: ImageStreamTag
      name: presidio-e2e-tests:latest
