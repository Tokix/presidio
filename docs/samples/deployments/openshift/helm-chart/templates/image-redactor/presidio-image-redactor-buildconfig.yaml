apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: presidio-image-redactor
  labels:
    app: presidio-image-redactor
spec:
  source:
    type: Git
    git:
      uri: https://github.com/microsoft/presidio.git
    contextDir: presidio-image-redactor
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: presidio-image-redactor:latest
  triggers:
    - type: ImageChange
    - type: ConfigChange
